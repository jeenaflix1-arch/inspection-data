<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scope Solar ERP — Complete Business Management</title>
<style>
:root{
  --bg:#0a1730; --card:#0f2347; --border:#1e3a6b; --muted:#9bb3d9; --fg:#f3f6ff;
  --primary:#f97316; --primary2:#fbbf24;
  --navy:#0a1730; --navy2:#13294d;
  --success:#10b981; --success-bg:rgba(16,185,129,.15);
  --danger:#ef4444; --danger-bg:rgba(239,68,68,.18);
  --info:#38bdf8; --info-bg:rgba(56,189,248,.15);
  --secondary:#13294d;
}
*{box-sizing:border-box}
html,body{margin:0;background:linear-gradient(180deg,#06101f,#0a1730);color:var(--fg);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh}
a{color:var(--primary2);text-decoration:none}
header{position:sticky;top:0;z-index:40;background:rgba(10,23,48,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.wrap{max-width:1500px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#fbbf24,#f97316);display:grid;place-items:center;color:#1a1208;font-weight:900;font-size:18px;box-shadow:0 6px 18px rgba(249,115,22,.35)}
.brand h1{margin:0;font-size:16px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
.sub{color:var(--muted);font-size:11.5px}
.spacer{flex:1}
.user-chip{background:var(--secondary);border:1px solid var(--border);padding:6px 10px;border-radius:10px;font-size:12px;display:flex;gap:8px;align-items:center}
.role-badge{background:linear-gradient(135deg,#fbbf24,#f97316);color:#1a1208;font-weight:700;font-size:10px;padding:2px 7px;border-radius:999px}
nav.tabs{max-width:1500px;margin:0 auto;padding:0 14px 10px;display:flex;gap:6px;flex-wrap:wrap;overflow-x:auto}
nav.tabs button{background:var(--secondary);border:1px solid var(--border);color:var(--fg);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap;transition:all .15s}
nav.tabs button:hover{border-color:var(--primary)}
nav.tabs button.active{background:linear-gradient(135deg,#f97316,#fbbf24);color:#1a1208;border-color:transparent}
main{max-width:1500px;margin:0 auto;padding:16px}
.page{display:none}
.page.active{display:block;animation:fade .2s ease-out}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.page-title{margin:0 0 14px;font-size:20px;display:flex;align-items:center;gap:10px}
h2.page-title .pill{font-size:11px;background:var(--secondary);border:1px solid var(--border);padding:3px 8px;border-radius:999px;color:var(--muted);font-weight:500}
.grid{display:grid;gap:12px}
.grid.cols-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.kpi{background:linear-gradient(135deg,var(--card),var(--secondary));border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary2))}
.kpi .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.kpi .value{font-size:22px;font-weight:800;margin-top:6px}
.kpi .delta{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.success::before{background:var(--success)} .kpi.success .value{color:var(--success)}
.kpi.danger::before{background:var(--danger)} .kpi.danger .value{color:var(--danger)}
.kpi.info::before{background:var(--info)} .kpi.info .value{color:var(--info)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
input,select,textarea{background:var(--navy2);border:1px solid var(--border);color:var(--fg);padding:8px 10px;border-radius:8px;font:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
input[type=date]{color-scheme:dark}
label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field{display:flex;flex-direction:column}
button.btn{background:linear-gradient(135deg,#f97316,#fbbf24);color:#1a1208;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12.5px;transition:transform .1s}
button.btn:hover{transform:translateY(-1px)}
button.btn.sec{background:var(--secondary);color:var(--fg);border:1px solid var(--border)}
button.btn.danger{background:var(--danger);color:#fff}
button.btn.success{background:var(--success);color:#fff}
button.btn.sm{padding:5px 9px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
table th,table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
table th{background:var(--navy2);color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.04em;position:sticky;top:0}
table tr:hover td{background:rgba(249,115,22,.04)}
.tbl-wrap{overflow-x:auto;max-height:65vh;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10.5px;font-weight:700;text-transform:uppercase}
.badge.success{background:var(--success-bg);color:var(--success)}
.badge.danger{background:var(--danger-bg);color:var(--danger)}
.badge.info{background:var(--info-bg);color:var(--info)}
.badge.warn{background:rgba(251,191,36,.2);color:var(--primary2)}
.badge.muted{background:var(--secondary);color:var(--muted)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(6,16,31,.85);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:30px 12px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;max-width:680px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{margin:0 0 12px;font-size:17px;color:var(--primary2)}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.section-title{font-size:14px;color:var(--primary2);margin:14px 0 8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--success);border-left:4px solid var(--success);padding:10px 14px;border-radius:8px;min-width:240px;animation:slideIn .25s ease-out;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.toast.error{border-color:var(--danger);border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty .icon{font-size:48px;opacity:.4;margin-bottom:8px}
.tag{background:var(--secondary);padding:2px 7px;border-radius:6px;font-size:11px}
.money{font-variant-numeric:tabular-nums;font-weight:700}
.money.pos{color:var(--success)} .money.neg{color:var(--danger)}
.print-only{display:none}
@media print{
  header,nav.tabs,.toolbar,.no-print{display:none!important}
  .print-only{display:block}
  body{background:#fff;color:#000}
  .card{background:#fff;border:1px solid #ccc;box-shadow:none;color:#000}
  table th{background:#f5f5f5;color:#000} table td{color:#000}
}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#06101f,#0a1730 50%,#13294d);display:grid;place-items:center;z-index:500;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,#fbbf24,#f97316);display:grid;place-items:center;margin:0 auto 14px;font-size:28px;font-weight:900;color:#1a1208}
.tabs-sub{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tabs-sub button{background:var(--secondary);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11.5px;font-weight:600}
.tabs-sub button.active{background:var(--primary);color:#1a1208;border-color:transparent}
.alert{background:rgba(56,189,248,.1);border:1px solid var(--info);border-left:4px solid var(--info);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:10px}
.alert.warn{background:rgba(251,191,36,.1);border-color:var(--primary2);border-left-color:var(--primary2)}
.alert.danger{background:var(--danger-bg);border-color:var(--danger);border-left-color:var(--danger)}
.tiny{font-size:11px;color:var(--muted)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:600px){.split{grid-template-columns:1fr}}
.checkbox{display:flex;gap:6px;align-items:center;font-size:12px}
.checkbox input{width:16px;height:16px}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.scrollx{overflow-x:auto}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:12.5px}
.stat-row:last-child{border:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-bg">
  <div class="login-card">
    <div class="login-logo">S</div>
    <h2 style="text-align:center;margin:0 0 4px;font-size:18px">Scope Solar ERP</h2>
    <p class="tiny" style="text-align:center;margin:0 0 18px">Complete Business Management Platform</p>
    <div class="field"><label>Username</label><input id="loginUser" value="admin"></div>
    <div class="field" style="margin-top:8px"><label>Password</label><input id="loginPass" type="password" value="admin"></div>
    <button class="btn" style="width:100%;margin-top:14px;padding:10px" onclick="doLogin()">Sign In</button>
    <div class="tiny" style="text-align:center;margin-top:10px">Default: admin / admin · accountant / 1234 · manager / 1234</div>
  </div>
</div>

<!-- HEADER -->
<header id="hdr" style="display:none">
  <div class="wrap">
    <div class="logo">S</div>
    <div class="brand">
      <h1>Scope Solar ERP</h1>
      <div class="sub">Solar Energy Management Platform</div>
    </div>
    <div class="spacer"></div>
    <div class="user-chip">
      <span id="uName">—</span>
      <span class="role-badge" id="uRole">—</span>
      <button class="btn sm sec" onclick="exportAll()">⬇ Backup</button>
      <button class="btn sm sec" onclick="importPrompt()">⬆ Restore</button>
      <button class="btn sm danger" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main id="app" style="display:none"></main>

<div class="toast-wrap" id="toasts"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
/* ===================== STATE & PERSISTENCE ===================== */
const LS_KEY = 'scopeSolarERP_v1';
const defaultData = {
  users:[
    {u:'admin',p:'admin',name:'Owner',role:'Owner'},
    {u:'accountant',p:'1234',name:'Accountant',role:'Accountant'},
    {u:'manager',p:'1234',name:'Manager',role:'Manager'},
    {u:'store',p:'1234',name:'Store Keeper',role:'Store Manager'},
    {u:'sales',p:'1234',name:'Sales',role:'Sales Team'},
  ],
  customers:[
    {id:'C001',name:'Ahmad Khan',phone:'0300-1234567',address:'Lahore',email:'ahmad@example.com',cnic:'',createdAt:Date.now()},
    {id:'C002',name:'Bilal Traders',phone:'0321-9876543',address:'Karachi',email:'',cnic:'',createdAt:Date.now()},
  ],
  leads:[
    {id:'L001',name:'Hassan Ali',phone:'0345-1112222',source:'Facebook',status:'New',note:'Interested in 10kW',date:new Date().toISOString().slice(0,10)},
  ],
  quotations:[],
  contracts:[],
  suppliers:[
    {id:'S001',name:'Solar World Pvt',phone:'042-111222',address:'Lahore',contact:'Imran'},
  ],
  employees:[
    {id:'E001',name:'Usman Iqbal',role:'Installer',phone:'0301-1111111',cnic:'',salary:35000,joinDate:'2024-01-15'},
    {id:'E002',name:'Salman Ahmed',role:'Fabricator',phone:'0302-2222222',cnic:'',salary:40000,joinDate:'2024-03-01'},
  ],
  vehicles:[
    {id:'V001',number:'LEA-1234',type:'Bike',model:'Honda 125',assigned:'E001',regDate:'2023-01-01'},
    {id:'V002',number:'LXR-7788',type:'Van',model:'Suzuki Bolan',assigned:'',regDate:'2022-06-10'},
  ],
  projects:[
    {id:'P001',name:'Khan Residence 10kW',customerId:'C001',location:'DHA Lahore',sizeKW:10,value:1200000,status:'In Progress',installStatus:'Material on Site',team:'E001,E002',startDate:'2025-01-10'},
  ],
  inventory:[
    {id:'IT001',name:'Jinko 555W Panel',category:'Solar Panels',unit:'pcs',stock:0,rate:18000,supplierId:'S001',minStock:10},
    {id:'IT002',name:'Inverex 10kW Inverter',category:'Inverters',unit:'pcs',stock:0,rate:350000,supplierId:'S001',minStock:2},
    {id:'IT003',name:'Lithium Battery 100Ah',category:'Batteries',unit:'pcs',stock:0,rate:120000,supplierId:'S001',minStock:4},
    {id:'IT004',name:'DC Cable 6mm',category:'DC Cables',unit:'meter',stock:0,rate:180,supplierId:'S001',minStock:200},
    {id:'IT005',name:'AC Cable 3-core',category:'AC Cables',unit:'meter',stock:0,rate:240,supplierId:'S001',minStock:100},
    {id:'IT006',name:'L2/L3 Structure Set',category:'Structures',unit:'set',stock:0,rate:8500,supplierId:'S001',minStock:5},
    {id:'IT007',name:'63A DC Breaker',category:'Breakers',unit:'pcs',stock:0,rate:2500,supplierId:'S001',minStock:10},
  ],
  stockMoves:[],          // {id, date, type:'PURCHASE'|'ISSUE'|'RETURN', itemId, qty, rate, projectId, supplierId, note}
  income:[],              // {id, date, source, customerId, projectId, amount, mode, note}
  expenses:[],            // {id, date, category, subCategory, refType, refId, amount, note, projectId}
  payroll:[],             // {id, date, employeeId, type:'Salary'|'Advance'|'Bonus'|'Deduction', amount, note, month}
  fuelLogs:[],            // {id, date, vehicleId, liters, amount, employeeId, note}
  maintenance:[],         // {id, date, vehicleId, type, amount, note}
  laborLogs:[],           // {id, date, projectId, employeeId, hours, amount, note}
  attendance:[],          // {id, date, employeeId, status}
  cashAccounts:[
    {id:'CA001',name:'Cash in Hand',type:'Cash',opening:0},
    {id:'CA002',name:'HBL Main Account',type:'Bank',opening:0},
    {id:'CA003',name:'Meezan Business',type:'Bank',opening:0},
  ],
  transfers:[],
  daily:[],               // unified daily entry log
};

let DB = loadDB();
let CURRENT = null;

function loadDB(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return JSON.parse(JSON.stringify(defaultData));
    return {...JSON.parse(JSON.stringify(defaultData)), ...JSON.parse(raw)};
  }catch(e){return JSON.parse(JSON.stringify(defaultData));}
}
function saveDB(){localStorage.setItem(LS_KEY, JSON.stringify(DB));}
function uid(p='X'){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,5).toUpperCase();}
function fmt(n){n=Number(n)||0;return n.toLocaleString('en-PK',{maximumFractionDigits:0});}
function money(n){return 'Rs '+fmt(n);}
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg,type='success'){
  const t=document.createElement('div');t.className='toast '+(type==='error'?'error':'');t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

/* ===================== AUTH ===================== */
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const user=DB.users.find(x=>x.u===u && x.p===p);
  if(!user){toast('Invalid credentials','error');return;}
  CURRENT=user; sessionStorage.setItem('ss_user',JSON.stringify(user));
  startApp();
}
function logout(){sessionStorage.removeItem('ss_user');location.reload();}
function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('hdr').style.display='block';
  document.getElementById('app').style.display='block';
  document.getElementById('uName').textContent=CURRENT.name;
  document.getElementById('uRole').textContent=CURRENT.role;
  buildTabs(); navigate('dashboard');
}

/* ===================== ROLES ===================== */
const ROLE_ACCESS={
  Owner:['*'],
  Admin:['*'],
  Manager:['dashboard','projects','customers','leads','quotations','daily','inventory','materials','employees','vehicles','reports'],
  Accountant:['dashboard','accounts','expenses','income','payroll','customers','suppliers','reports','ledgers'],
  'Store Manager':['dashboard','inventory','materials','suppliers','daily'],
  'Sales Team':['dashboard','customers','leads','quotations','projects'],
  'Installation Team':['dashboard','projects','daily','materials'],
};
function can(tab){
  const a=ROLE_ACCESS[CURRENT.role]||[];
  return a.includes('*')||a.includes(tab);
}

/* ===================== NAV ===================== */
const TABS=[
  {id:'dashboard',label:'🏠 Dashboard'},
  {id:'projects',label:'📋 Projects'},
  {id:'customers',label:'👥 Customers'},
  {id:'leads',label:'🎯 Leads & CRM'},
  {id:'quotations',label:'📄 Quotations'},
  {id:'daily',label:'⚡ Daily Entry'},
  {id:'inventory',label:'📦 Inventory'},
  {id:'materials',label:'🚚 Site Materials'},
  {id:'suppliers',label:'🏭 Suppliers'},
  {id:'employees',label:'👷 Employees'},
  {id:'payroll',label:'💵 Payroll'},
  {id:'vehicles',label:'🚗 Vehicles'},
  {id:'expenses',label:'💸 Expenses'},
  {id:'income',label:'💰 Income'},
  {id:'accounts',label:'🏦 Cash & Bank'},
  {id:'ledgers',label:'📚 Ledgers'},
  {id:'reports',label:'📊 Reports'},
  {id:'settings',label:'⚙ Settings'},
];
let activeTab='dashboard';
function buildTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  TABS.filter(t=>can(t.id)||CURRENT.role==='Owner'||CURRENT.role==='Admin').forEach(t=>{
    const b=document.createElement('button');b.textContent=t.label;b.dataset.id=t.id;
    b.onclick=()=>navigate(t.id);
    if(t.id===activeTab)b.classList.add('active');
    el.appendChild(b);
  });
}
function navigate(id){
  activeTab=id;buildTabs();
  const app=document.getElementById('app');
  app.innerHTML=`<div class="page active" id="page-${id}"></div>`;
  (PAGES[id]||PAGES.dashboard)(document.getElementById('page-'+id));
}

/* ===================== HELPERS ===================== */
function getCustomer(id){return DB.customers.find(c=>c.id===id)||{name:'—'};}
function getProject(id){return DB.projects.find(p=>p.id===id)||{name:'—'};}
function getEmployee(id){return DB.employees.find(e=>e.id===id)||{name:'—'};}
function getItem(id){return DB.inventory.find(i=>i.id===id)||{name:'—'};}
function getSupplier(id){return DB.suppliers.find(s=>s.id===id)||{name:'—'};}
function getVehicle(id){return DB.vehicles.find(v=>v.id===id)||{number:'—'};}

function totalIncome(){return DB.income.reduce((s,x)=>s+Number(x.amount||0),0);}
function totalExpenses(){
  const exp=DB.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const pay=DB.payroll.filter(p=>p.type==='Salary'||p.type==='Bonus'||p.type==='Advance').reduce((s,x)=>s+Number(x.amount||0),0);
  return exp+pay;
}
function inventoryValue(){return DB.inventory.reduce((s,i)=>s+i.stock*i.rate,0);}
function projectStock(itemId){
  // current global stock
  return DB.stockMoves.reduce((s,m)=>{
    if(m.itemId!==itemId)return s;
    if(m.type==='PURCHASE'||m.type==='RETURN')return s+Number(m.qty);
    if(m.type==='ISSUE')return s-Number(m.qty);
    return s;
  },0);
}
function recalcStock(){
  DB.inventory.forEach(i=>{i.stock=projectStock(i.id);});
}
function projectCost(pid){
  const mat=DB.stockMoves.filter(m=>m.projectId===pid&&m.type==='ISSUE').reduce((s,m)=>s+m.qty*m.rate,0)
          - DB.stockMoves.filter(m=>m.projectId===pid&&m.type==='RETURN').reduce((s,m)=>s+m.qty*m.rate,0);
  const fuel=DB.fuelLogs.filter(f=>f.projectId===pid).reduce((s,f)=>s+Number(f.amount||0),0);
  const labor=DB.laborLogs.filter(l=>l.projectId===pid).reduce((s,l)=>s+Number(l.amount||0),0);
  const exp=DB.expenses.filter(e=>e.projectId===pid).reduce((s,e)=>s+Number(e.amount||0),0);
  return {mat,fuel,labor,exp,total:mat+fuel+labor+exp};
}
function projectPaid(pid){return DB.income.filter(i=>i.projectId===pid).reduce((s,i)=>s+Number(i.amount),0);}

/* ===================== MODAL ===================== */
function openModal(html){
  document.getElementById('modal').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});

/* ===================== PAGES ===================== */
const PAGES={};

/* ---------- DASHBOARD ---------- */
PAGES.dashboard=el=>{
  recalcStock();
  const income=totalIncome(), exp=totalExpenses(), profit=income-exp;
  const active=DB.projects.filter(p=>p.status==='In Progress').length;
  const completed=DB.projects.filter(p=>p.status==='Completed').length;
  const receivables=DB.projects.reduce((s,p)=>{

function logDaily(type,desc,amount){DB.daily.push({ts:Date.now(),type,desc,amount});}

function addFuel(){
  const d={id:uid('F'),date:document.getElementById('fl-date').value,vehicleId:document.getElementById('fl-veh').value,
    liters:Number(document.getElementById('fl-l').value),amount:Number(document.getElementById('fl-amt').value),
    projectId:document.getElementById('fl-proj').value,note:document.getElementById('fl-note').value};
  if(!d.amount){toast('Amount required','error');return;}
  DB.fuelLogs.push(d);
  DB.expenses.push({id:uid('E'),date:d.date,category:'Fuel',subCategory:getVehicle(d.vehicleId).number,refType:'fuel',refId:d.id,amount:d.amount,note:`${d.liters}L · ${d.note}`,projectId:d.projectId});
  logDaily('FUEL',`${getVehicle(d.vehicleId).number} · ${d.liters}L`,d.amount);
  saveDB();toast('Fuel saved → Vehicle + Expense + Reports');navigate('daily');
}
function addExpenseDaily(){
  const d={id:uid('E'),date:document.getElementById('ex-date').value,category:document.getElementById('ex-cat').value,
    subCategory:'',refType:'manual',refId:'',amount:Number(document.getElementById('ex-amt').value),
    note:document.getElementById('ex-note').value,projectId:document.getElementById('ex-proj').value};
  if(!d.amount){toast('Amount required','error');return;}
  DB.expenses.push(d);logDaily('EXPENSE',d.category,d.amount);
  saveDB();toast('Expense saved → Accounting + Reports');navigate('daily');
}
function addPurchase(){
  const it=document.getElementById('mp-item').value, qty=Number(document.getElementById('mp-qty').value),
    rate=Number(document.getElementById('mp-rate').value), sup=document.getElementById('mp-sup').value,
    date=document.getElementById('mp-date').value, paid=document.getElementById('mp-paid').value==='1';
  if(!qty||!rate){toast('Qty & rate required','error');return;}
  const mv={id:uid('SM'),date,type:'PURCHASE',itemId:it,qty,rate,projectId:'',supplierId:sup,note:'Purchase'};
  DB.stockMoves.push(mv);
  DB.expenses.push({id:uid('E'),date,category:'Material Purchase',subCategory:getItem(it).name,refType:'purchase',refId:mv.id,amount:qty*rate,note:`From ${getSupplier(sup).name} ${paid?'(paid)':'(credit)'}`,projectId:''});
  recalcStock();logDaily('PURCHASE',`${getItem(it).name} × ${qty}`,qty*rate);
  saveDB();toast('Inventory + Supplier + Accounting updated');navigate('daily');
}
function addIssue(){
  const it=document.getElementById('mi-item').value, qty=Number(document.getElementById('mi-qty').value),
    proj=document.getElementById('mi-proj').value, date=document.getElementById('mi-date').value,
    type=document.getElementById('mi-type').value, note=document.getElementById('mi-note').value;
  const item=getItem(it);
  if(!qty){toast('Qty required','error');return;}
  if(type==='ISSUE'&&qty>item.stock){toast('Not enough stock','error');return;}
  DB.stockMoves.push({id:uid('SM'),date,type,itemId:it,qty,rate:item.rate,projectId:proj,supplierId:'',note});
  recalcStock();logDaily(type,`${item.name} × ${qty} → ${getProject(proj).name}`,qty*item.rate);
  saveDB();toast(`Material ${type==='ISSUE'?'issued':'returned'} → Project + Inventory updated`);navigate('daily');
}
function addPayroll(){
  const d={id:uid('PR'),date:document.getElementById('sl-date').value,employeeId:document.getElementById('sl-emp').value,
    type:document.getElementById('sl-type').value,amount:Number(document.getElementById('sl-amt').value),
    month:document.getElementById('sl-month').value,note:document.getElementById('sl-note').value};
  if(!d.amount){toast('Amount required','error');return;}
  DB.payroll.push(d);
  if(d.type==='Salary'||d.type==='Bonus'||d.type==='Advance'){
    DB.expenses.push({id:uid('E'),date:d.date,category:'Salary',subCategory:getEmployee(d.employeeId).name+' · '+d.type,refType:'payroll',refId:d.id,amount:d.amount,note:d.month,projectId:''});
  }
  logDaily(d.type.toUpperCase(),getEmployee(d.employeeId).name,d.amount);
  saveDB();toast('Payroll + Accounting updated');navigate('daily');
}
function addIncomeDaily(){
  const d={id:uid('IN'),date:document.getElementById('in-date').value,source:'Customer Payment',
    customerId:document.getElementById('in-cust').value,projectId:document.getElementById('in-proj').value,
    amount:Number(document.getElementById('in-amt').value),mode:document.getElementById('in-mode').value,
    note:document.getElementById('in-note').value};
  if(!d.amount){toast('Amount required','error');return;}
  DB.income.push(d);logDaily('INCOME',getCustomer(d.customerId).name,d.amount);
  saveDB();toast('Income → Customer Ledger + Project + Reports');navigate('daily');
}

function ledgerSwitch(t){
  document.querySelectorAll('.tabs-sub button').forEach(b=>b.classList.toggle('active',b.dataset.l===t));
  const area=document.getElementById('ledArea');
  if(t==='cust'){
    area.innerHTML=`<div class="toolbar"><select id="ledCust">${DB.customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
    <button class="btn sec" onclick="exportHTML('CustomerLedger',document.getElementById('ledOut').innerHTML)">⬇ HTML</button>
    <button class="btn sec" onclick="window.print()">🖨 Print</button></div>
    <div id="ledOut" class="card"></div>`;
    const draw=()=>{
      const cid=document.getElementById('ledCust').value, c=getCustomer(cid);
      const proj=DB.projects.filter(p=>p.customerId===cid);
      const inc=DB.income.filter(i=>i.customerId===cid);
      const billed=proj.reduce((s,p)=>s+(Number(p.value)||0),0);
      const paid=inc.reduce((s,i)=>s+i.amount,0);
      document.getElementById('ledOut').innerHTML=`<h3>${c.name} — Ledger</h3>
      <p class="tiny">${c.phone} · ${c.address||''}</p>
      <div class="grid cols-3"><div class="kpi"><div class="label">Total Billed</div><div class="value">${money(billed)}</div></div>
      <div class="kpi success"><div class="label">Received</div><div class="value">${money(paid)}</div></div>
      <div class="kpi danger"><div class="label">Outstanding</div><div class="value">${money(billed-paid)}</div></div></div>
      <div class="section-title">Transactions</div>
      <div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Debit</th><th>Credit</th></tr></thead><tbody>
      ${proj.map(p=>`<tr><td>${p.startDate}</td><td>Invoice</td><td>${p.name}</td><td class="money">${money(p.value)}</td><td>—</td></tr>`).join('')}
      ${inc.map(i=>`<tr><td>${i.date}</td><td>Payment</td><td>${i.mode} ${i.note||''}</td><td>—</td><td class="money pos">${money(i.amount)}</td></tr>`).join('')}
      </tbody></table></div>`;
    };
    document.getElementById('ledCust').onchange=draw;draw();
  } else if(t==='sup'){
    area.innerHTML=`<div class="toolbar"><select id="ledSup">${DB.suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
    <button class="btn sec" onclick="exportHTML('SupplierLedger',document.getElementById('ledOut').innerHTML)">⬇ HTML</button></div>
    <div id="ledOut" class="card"></div>`;
    const draw=()=>{
      const sid=document.getElementById('ledSup').value, s=getSupplier(sid);
      const purch=DB.stockMoves.filter(m=>m.supplierId===sid&&m.type==='PURCHASE');
      const total=purch.reduce((a,m)=>a+m.qty*m.rate,0);
      document.getElementById('ledOut').innerHTML=`<h3>${s.name} — Ledger</h3>
      <div class="grid cols-3"><div class="kpi"><div class="label">Total Purchases</div><div class="value">${money(total)}</div></div></div>
      <div class="section-title">Purchases</div>
      <div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead><tbody>
      ${purch.map(m=>`<tr><td>${m.date}</td><td>${getItem(m.itemId).name}</td><td>${m.qty}</td><td>${money(m.rate)}</td><td class="money">${money(m.qty*m.rate)}</td></tr>`).join('')}
      </tbody></table></div>`;
    };
    document.getElementById('ledSup').onchange=draw;draw();
  } else {
    area.innerHTML=`<div class="toolbar"><select id="ledProj">${DB.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
    <button class="btn sec" onclick="exportHTML('ProjectLedger',document.getElementById('ledOut').innerHTML)">⬇ HTML</button></div>
    <div id="ledOut" class="card"></div>`;
    const draw=()=>{
      const pid=document.getElementById('ledProj').value;
      document.getElementById('ledOut').innerHTML=buildProjectHTML(pid);
    };
    document.getElementById('ledProj').onchange=draw;draw();
  }
}

/* ===================== HTML EXPORT HELPERS ===================== */
function exportAll(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='scope-solar-backup-'+today()+'.json';a.click();
}
function importPrompt(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{DB=JSON.parse(ev.target.result);saveDB();toast('Restored');location.reload();}catch(err){toast('Invalid file','error');}};r.readAsText(e.target.files[0]);};
  i.click();
}
function exportTable(name){
  // simple CSV export
  const tbl=document.querySelector('table');if(!tbl)return;
  const rows=[...tbl.querySelectorAll('tr')].map(r=>[...r.querySelectorAll('th,td')].slice(0,-1).map(c=>`"${c.innerText.replace(/"/g,'""')}"`).join(','));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.csv';a.click();
}
function htmlWrap(title,body){
  return `<!doctype html><html><head><meta charset="utf-8"><title>${title}</title>
  <style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;max-width:1100px;margin:20px auto;padding:20px;color:#222}
  h1,h2,h3{color:#0a1730} .header{border-bottom:3px solid #f97316;padding-bottom:10px;margin-bottom:20px}
  .header h1{margin:0;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;background-clip:text;color:transparent}
  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#0a1730;color:#fff}
  tr:nth-child(even){background:#f9f9f9}
  .money{font-weight:700;text-align:right} .pos{color:#10b981} .neg{color:#ef4444}
  .badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#eee}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}
  .kpi{background:#f5f5f5;border-left:4px solid #f97316;padding:10px 14px;border-radius:6px}
  .kpi .label{font-size:11px;color:#666;text-transform:uppercase}
  .kpi .value{font-size:20px;font-weight:800;color:#0a1730;margin-top:4px}
  footer{margin-top:30px;text-align:center;color:#888;font-size:11px;border-top:1px solid #ddd;padding-top:10px}
  @media print{body{margin:10px}}
  </style></head><body>
  <div class="header"><h1>⚡ Scope Solar</h1><div style="color:#666;font-size:13px">${title} · Generated ${new Date().toLocaleString()}</div></div>
  ${body}
  <footer>Scope Solar Management System · ERP Report</footer>
  </body></html>`;
}
function exportHTML(name,body){
  const html=htmlWrap(name,body);
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name.replace(/\s+/g,'_')+'.html';a.click();
  toast('HTML downloaded');
}
function buildSimpleHTML(title,rows,cols){
  if(!rows.length)return `<p>No data.</p>`;
  return `<h2>${title}</h2><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>
  ${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

  ${DB.customers.map(c=>{const bal=DB.projects.filter(p=>p.customerId===c.id).reduce((s,p)=>s+(p.value||0)-projectPaid(p.id),0);return `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.phone}</td><td>${c.address||''}</td><td>${c.email||''}</td><td class="money">${money(bal)}</td></tr>`;}).join('')}

function buildProjectsHTML(){

  ${DB.projects.map(p=>{const paid=projectPaid(p.id),c=projectCost(p.id).total,pr=p.value-c,out=Math.max(0,p.value-paid);return `<tr><td>${p.id}</td><td>${p.name}</td><td>${getCustomer(p.customerId).name}</td><td>${p.sizeKW} kW</td><td class="money">${money(p.value)}</td><td class="money pos">${money(paid)}</td><td class="money neg">${money(out)}</td><td class="money neg">${money(c)}</td><td class="money ${pr>=0?'pos':'neg'}">${money(pr)}</td><td>${p.status}</td></tr>`;}).join('')}

function buildProjectHTML(pid){
  const p=getProject(pid);if(!p.id)return '<p>Not found</p>';
  const c=projectCost(pid),paid=projectPaid(pid),out=Math.max(0,p.value-paid),profit=p.value-c.total;
  const mats=DB.stockMoves.filter(m=>m.projectId===pid);
  return `<h2>${p.name}</h2>
  <p><b>Customer:</b> ${getCustomer(p.customerId).name} · <b>Location:</b> ${p.location||'—'} · <b>Size:</b> ${p.sizeKW} kW · <b>Status:</b> ${p.status}</p>
  <div class="kpi-grid">
    <div class="kpi"><div class="label">Project Value</div><div class="value">${money(p.value)}</div></div>
    <div class="kpi"><div class="label">Received</div><div class="value">${money(paid)}</div></div>
    <div class="kpi"><div class="label">Outstanding</div><div class="value">${money(out)}</div></div>
    <div class="kpi"><div class="label">Material Cost</div><div class="value">${money(c.mat)}</div></div>
    <div class="kpi"><div class="label">Fuel</div><div class="value">${money(c.fuel)}</div></div>
    <div class="kpi"><div class="label">Labor</div><div class="value">${money(c.labor)}</div></div>
    <div class="kpi"><div class="label">Other Exp</div><div class="value">${money(c.exp)}</div></div>
    <div class="kpi"><div class="label">Total Cost</div><div class="value">${money(c.total)}</div></div>
    <div class="kpi"><div class="label">Net Profit</div><div class="value">${money(profit)}</div></div>
  </div>
  <h3>Material History</h3>
  <table><thead><tr><th>Date</th><th>Type</th><th>Item</th><th>Qty</th><th>Rate</th><th>Value</th></tr></thead><tbody>
  ${mats.map(m=>`<tr><td>${m.date}</td><td>${m.type}</td><td>${getItem(m.itemId).name}</td><td>${m.qty}</td><td>${money(m.rate)}</td><td class="money">${money(m.qty*m.rate)}</td></tr>`).join('')}
  </tbody></table>`;
}
function buildInventoryHTML(){
  return `<h2>Inventory Report · Value ${money(inventoryValue())}</h2>
  <table><thead><tr><th>Code</th><th>Item</th><th>Category</th><th>Unit</th><th>Stock</th><th>Min</th><th>Rate</th><th>Value</th></tr></thead><tbody>
  ${DB.inventory.map(i=>`<tr><td>${i.id}</td><td>${i.name}</td><td>${i.category}</td><td>${i.unit}</td><td>${i.stock}</td><td>${i.minStock}</td><td class="money">${money(i.rate)}</td><td class="money">${money(i.stock*i.rate)}</td></tr>`).join('')}
  </tbody></table>`;
}
function buildExpensesHTML(){
  return `<h2>Expenses Report · Total ${money(totalExpenses())}</h2>
  <table><thead><tr><th>Date</th><th>Category</th><th>Sub</th><th>Project</th><th>Amount</th><th>Note</th></tr></thead><tbody>
  ${DB.expenses.map(e=>`<tr><td>${e.date}</td><td>${e.category}</td><td>${e.subCategory||''}</td><td>${e.projectId?getProject(e.projectId).name:'—'}</td><td class="money neg">${money(e.amount)}</td><td>${e.note||''}</td></tr>`).join('')}
  </tbody></table>`;
}
function buildVehiclesHTML(){
  return `<h2>Vehicle Expense Report</h2>
  <table><thead><tr><th>ID</th><th>Number</th><th>Type</th><th>Assigned</th><th>Fuel Total</th><th>Maintenance Total</th><th>Grand Total</th></tr></thead><tbody>
  ${DB.vehicles.map(v=>{const f=DB.fuelLogs.filter(x=>x.vehicleId===v.id).reduce((s,x)=>s+x.amount,0);const m=DB.maintenance.filter(x=>x.vehicleId===v.id).reduce((s,x)=>s+x.amount,0);return `<tr><td>${v.id}</td><td>${v.number}</td><td>${v.type}</td><td>${v.assigned?getEmployee(v.assigned).name:'—'}</td><td class="money">${money(f)}</td><td class="money">${money(m)}</td><td class="money neg">${money(f+m)}</td></tr>`;}).join('')}
  </tbody></table>`;
}
function buildMaterialsHTML(filter){
  const moves=DB.stockMoves.filter(m=>m.type!=='PURCHASE'&&(!filter||m.projectId===filter));
  return `<h2>Site Material Movements</h2>
  <table><thead><tr><th>Date</th><th>Project</th><th>Type</th><th>Item</th><th>Qty</th><th>Value</th><th>Note</th></tr></thead><tbody>
  ${moves.map(m=>`<tr><td>${m.date}</td><td>${getProject(m.projectId).name}</td><td>${m.type}</td><td>${getItem(m.itemId).name}</td><td>${m.qty}</td><td class="money">${money(m.qty*m.rate)}</td><td>${m.note||''}</td></tr>`).join('')}
  </tbody></table>`;
}
function buildPLHTML(){
  const inc=totalIncome(),exp=totalExpenses(),profit=inc-exp;
  const byCat={};DB.expenses.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount;});
  return `<h2>Profit & Loss Statement</h2>
  <div class="kpi-grid">
    <div class="kpi"><div class="label">Total Income</div><div class="value">${money(inc)}</div></div>
    <div class="kpi"><div class="label">Total Expenses</div><div class="value">${money(exp)}</div></div>
    <div class="kpi"><div class="label">Net Profit</div><div class="value">${money(profit)}</div></div>
  </div>
  <h3>Income</h3>
  <table><thead><tr><th>Date</th><th>Customer</th><th>Project</th><th>Amount</th></tr></thead><tbody>
  ${DB.income.map(i=>`<tr><td>${i.date}</td><td>${getCustomer(i.customerId).name}</td><td>${i.projectId?getProject(i.projectId).name:'—'}</td><td class="money pos">${money(i.amount)}</td></tr>`).join('')}
  <tr><td colspan="3"><b>Total Income</b></td><td class="money pos"><b>${money(inc)}</b></td></tr>
  </tbody></table>
  <h3>Expenses by Category</h3>
  <table><thead><tr><th>Category</th><th>Amount</th></tr></thead><tbody>
  ${Object.entries(byCat).map(([k,v])=>`<tr><td>${k}</td><td class="money neg">${money(v)}</td></tr>`).join('')}
  <tr><td><b>Total Expenses</b></td><td class="money neg"><b>${money(exp)}</b></td></tr>
  </tbody></table>
  <h2 style="margin-top:20px;color:${profit>=0?'#10b981':'#ef4444'}">Net Profit: ${money(profit)}</h2>`;
}
function buildQuoteHTML(qid){
  const q=DB.quotations.find(x=>x.id===qid);if(!q)return'';
  const c=getCustomer(q.customerId);
  return `<h2>Quotation ${q.id}</h2>
  <p><b>Date:</b> ${q.date}<br><b>Customer:</b> ${c.name}<br><b>Phone:</b> ${c.phone}<br><b>System Size:</b> ${q.sizeKW} kW</p>
  <table><thead><tr><th>Description</th><th>Amount</th></tr></thead><tbody>
  <tr><td>${q.note||'Solar System Installation '+q.sizeKW+' kW'}</td><td class="money">${money(q.amount)}</td></tr>
  <tr><td><b>Total</b></td><td class="money"><b>${money(q.amount)}</b></td></tr>
  </tbody></table>
  <p style="margin-top:20px"><b>Status:</b> ${q.status}</p>
  <p style="margin-top:40px;border-top:1px solid #ccc;padding-top:10px"><b>Terms & Conditions:</b><br>• 50% advance required<br>• Installation within 15 working days<br>• 10-year warranty on panels<br>• 5-year warranty on inverter</p>`;
}

/* ===================== BOOT ===================== */
const saved=sessionStorage.getItem('ss_user');
if(saved){CURRENT=JSON.parse(saved);startApp();}
</script>
</body>
</html>
