<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scope Solar — Inspection Tracker</title>
<style>
:root{
  /* Scope Solar theme: navy + orange/yellow sunburst */
  --bg:#0a1730; --card:#0f2347; --border:#1e3a6b; --muted:#9bb3d9; --fg:#f3f6ff;
  --primary:#f97316; --primary2:#fbbf24;
  --navy:#0a1730; --navy2:#13294d;
  --success:#10b981; --success-bg:rgba(16,185,129,.15);
  --danger:#ef4444; --danger-bg:rgba(239,68,68,.18);
  --blank:#15294d; --secondary:#13294d;
}
*{box-sizing:border-box}
html,body{margin:0;background:linear-gradient(180deg,#06101f,#0a1730);color:var(--fg);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
header{position:sticky;top:0;z-index:30;background:rgba(10,23,48,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.wrap{max-width:1400px;margin:0 auto;padding:12px 14px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:10px;background:#fff;display:grid;place-items:center;padding:3px;box-shadow:0 6px 18px rgba(249,115,22,.35);flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:contain}
.brand-text h1{margin:0;font-size:17px;letter-spacing:.02em;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
.sub{color:var(--muted);font-size:11.5px}
.stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{background:var(--secondary);border:1px solid var(--border);padding:6px 10px;border-radius:10px;font-size:12px}
.stat b{font-size:14px;margin-left:4px}
.stat.s b{color:var(--success)} .stat.d b{color:var(--danger)}
main{max-width:1400px;margin:0 auto;padding:18px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;padding:10px 14px 10px 36px;background:var(--secondary);border:1px solid var(--border);border-radius:12px;color:var(--fg);font:inherit;outline:none}
.search:before{content:"🔍";position:absolute;left:11px;top:9px;opacity:.6}
.pills{display:flex;background:var(--secondary);border-radius:12px;padding:4px;gap:2px}
.pill{padding:7px 12px;border-radius:9px;border:0;background:transparent;color:var(--muted);cursor:pointer;font:inherit;font-size:12px;text-transform:capitalize}
.pill.active{background:var(--card);color:var(--fg);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.btn{padding:10px 16px;border-radius:12px;border:0;background:linear-gradient(135deg,#f97316,#fbbf24);color:#1a1208;font-weight:700;cursor:pointer;font:inherit;box-shadow:0 6px 16px rgba(249,115,22,.35)}
.btn.ghost{background:var(--secondary);color:var(--fg);box-shadow:none;border:1px solid var(--border)}
.btn.danger{background:transparent;color:var(--danger)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;color:var(--muted);font-size:12px}
.sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.sw.done{background:var(--success-bg);border:1px solid var(--success)}
.sw.pend{background:var(--danger-bg);border:1px solid var(--danger)}
.sw.blank{background:var(--blank);border:1px solid var(--border)}
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:16px;background:var(--card)}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
th,td{padding:8px 8px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
th{position:sticky;top:0;background:#152038;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
th.name,td.name{position:sticky;left:0;background:var(--card);text-align:left;min-width:240px;z-index:2;border-right:1px solid var(--border)}
th.name{background:#152038;z-index:3}
tr:hover td{background:rgba(255,255,255,.02)}
tr:hover td.name{background:#162241}
.cell{padding:6px 8px;border-radius:8px;font-size:11.5px;font-weight:600;min-width:84px;display:inline-block}
.cell.done{background:var(--success-bg);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}
.cell.pend{background:var(--danger-bg);color:#fca5a5;border:1px solid rgba(239,68,68,.5)}
.cell.blank{background:var(--blank);color:var(--muted);border:1px solid var(--border)}
.cell.na{background:#2a2236;color:#c4b5fd;border:1px solid #4c3a6b}
.prog{min-width:120px}
.bar{height:6px;background:#1c2742;border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#10b981,#34d399)}
.psub{display:flex;justify-content:space-between;font-size:10.5px;margin-top:3px;color:var(--muted)}
.psub .d{color:#6ee7b7;font-weight:600}.psub .p{color:#fca5a5;font-weight:600}
.empty{padding:40px;text-align:center;color:var(--muted)}
/* Mobile card layout */
.cards{display:none;flex-direction:column;gap:12px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:transform .15s,border-color .15s}
.scard:active{transform:scale(.99)}
.scard:hover{border-color:var(--primary)}
.scard-head{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:10px}
.scard-name{font-weight:700;font-size:15px;color:var(--fg);line-height:1.3}
.scard-install{color:var(--muted);font-size:11.5px;margin-top:3px}
.scard-install.no{color:#fca5a5}
.scard-prog{margin:10px 0 12px}
.scard-prog .bar{height:7px}
.scard-prog-meta{display:flex;justify-content:space-between;font-size:11.5px;margin-top:6px;color:var(--muted)}
.insp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.insp-cell{padding:8px 6px;border-radius:8px;font-size:10.5px;font-weight:600;text-align:center;line-height:1.25}
.insp-cell .m{display:block;font-size:9.5px;opacity:.75;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.insp-cell.done{background:var(--success-bg);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}
.insp-cell.pend{background:var(--danger-bg);color:#fca5a5;border:1px solid rgba(239,68,68,.5)}
.insp-cell.blank{background:var(--blank);color:var(--muted);border:1px solid var(--border)}
.insp-cell.na{background:#2a2236;color:#c4b5fd;border:1px solid #4c3a6b}
/* modal */
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:14px}
.modal.open{display:flex}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
.dialog{position:relative;background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.dialog.lg{max-width:720px}
.dhead{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:start;gap:10px;position:sticky;top:0;background:var(--card)}
.dhead h2{margin:0;font-size:17px}
.dbody{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:12px;flex-wrap:wrap}
.row .num{width:32px;height:32px;border-radius:8px;background:var(--secondary);display:grid;place-items:center;font-weight:700}
.row .label{flex:1;min-width:130px}
.row .label small{display:block;color:var(--muted);font-size:11px}
input[type=date],input[type=text]{background:var(--secondary);border:1px solid var(--border);color:var(--fg);padding:7px 10px;border-radius:8px;font:inherit;font-size:12.5px;outline:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
label.field{display:block;margin-bottom:4px}
label.field span{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
label.field input{width:100%}
.iconbtn{background:transparent;border:0;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;font-size:18px}
.iconbtn:hover{background:var(--secondary);color:var(--fg)}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.done{background:var(--success-bg);color:#6ee7b7}
.badge.pend{background:var(--danger-bg);color:#fca5a5}
.badge.blank{background:var(--blank);color:var(--muted)}
.badge.na{background:#2a2236;color:#c4b5fd}
.dfoot{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px;position:sticky;bottom:0;background:var(--card)}
@media (max-width:760px){
  .wrap{padding:10px 12px}
  main{padding:12px}
  .stats{display:none}
  .brand-text h1{font-size:15px}
  .sub{font-size:10.5px}
  .toolbar{gap:8px}
  .search{flex:1 1 100%;min-width:0}
  .pills{flex:1 1 100%;justify-content:space-between}
  .pill{flex:1;text-align:center}
  .btn{flex:1;padding:10px 8px;font-size:13px}
  .legend{font-size:11px;gap:10px}
  .tbl-wrap{display:none}
  .cards{display:flex}
  .panel{padding:12px;border-radius:14px}
  .dialog{max-height:96vh;border-radius:14px}
  .dhead,.dbody,.dfoot{padding:14px}
  .row{padding:10px;gap:8px}
  .row .label{flex:1 1 100%;min-width:0}
}

*{ -webkit-user-select:none; -moz-user-select:none; user-select:none; }
input,textarea{ -webkit-user-select:text; user-select:text; }
</style>
</head>

let sites = load();
let filter = "all", query = "", openId = null;

function load(){
  try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ localStorage.setItem(KEY, JSON.stringify(sites)); }

function addMonths(iso, m){
  if(!iso) return null;
  const [y,mo,d]=iso.split("-").map(Number);
  const dt=new Date(Date.UTC(y,mo-1,d));
  dt.setUTCMonth(dt.getUTCMonth()+m);
  return dt.toISOString().slice(0,10);
}
function statusFor(site, idx){
  const ins = site.inspections[idx];
  if(ins.noNeed) return "na";
  if(ins.date) return "done";
  const due = addMonths(site.installDate, MONTHS[idx]);
  if(!due) return "blank";
  return due <= new Date().toISOString().slice(0,10) ? "pend" : "blank";
}
function progressOf(s){
  let done=0,pend=0,total=0;
  for(let i=0;i<9;i++){
    const st = statusFor(s,i);
    if(st==="na") continue;
    total++; if(st==="done") done++; else if(st==="pend") pend++;
  }
  return {done,pend,total};
}

function render(){
  // header
  const thead = document.getElementById("thead");
  thead.innerHTML = '<th class="name">Site</th>' + LABELS.map((l,i)=>`<th><div style="font-size:10px;opacity:.7">Insp ${i+1}</div>${l} mo</th>`).join("") + '<th>Progress</th>';
  // filter
  const q = query.trim().toLowerCase();
  const list = sites.filter(s=>{
    if(q && !s.name.toLowerCase().includes(q)) return false;
    const p = progressOf(s);
    if(filter==="pending") return p.pend>0;
    if(filter==="done") return p.done>0;
    if(filter==="upcoming") return p.pend===0 && p.done<p.total;
    return true;
  });
  const tbody = document.getElementById("tbody");
  if(list.length===0){
    tbody.innerHTML=`<tr><td colspan="11" class="empty">No sites match your search.</td></tr>`;
  } else {
    tbody.innerHTML = list.map(s=>{
      const p = progressOf(s);
      const pct = p.total? (p.done/p.total*100):0;
      const cells = MONTHS.map((_,i)=>{
        const st = statusFor(s,i);
        const ins = s.inspections[i];
        const due = addMonths(s.installDate, MONTHS[i]);
        let txt = "—";
        if(st==="done") txt = ins.date;
        else if(st==="pend") txt = "⚠ "+(due||"Due");
        else if(st==="na") txt = "N/A";
        else if(due) txt = due;
        return `<td><span class="cell ${st}">${txt}</span></td>`;
      }).join("");
      return `<tr onclick="openSite('${s.id}')">
        <td class="name"><div style="font-weight:600">${escapeHtml(s.name)}</div>${s.installDate?`<div class="sub" style="font-size:11px">Installed ${s.installDate}</div>`:'<div class="sub" style="font-size:11px;color:#fca5a5">No install date</div>'}</td>
        ${cells}
        <td class="prog"><div class="bar"><i style="width:${pct}%"></i></div>
          <div class="psub"><span class="d">${p.done} done</span>${p.pend>0?`<span class="p">${p.pend} due</span>`:''}</div></td>
      </tr>`;
    }).join("");
  }
  // mobile cards
  const cards = document.getElementById("cards");
  if(list.length===0){
    cards.innerHTML = `<div class="panel empty">No sites match your search.</div>`;
  } else {
    cards.innerHTML = list.map(s=>{
      const p = progressOf(s);
      const pct = p.total? (p.done/p.total*100):0;
      const insps = MONTHS.map((m,i)=>{
        const st = statusFor(s,i);
        const ins = s.inspections[i];
        const due = addMonths(s.installDate, MONTHS[i]);
        let txt = "—";
        if(st==="done") txt = ins.date;
        else if(st==="pend") txt = "⚠ "+(due||"Due");
        else if(st==="na") txt = "N/A";
        else if(due) txt = due;
        return `<div class="insp-cell ${st}"><span class="m">${LABELS[i]} mo</span>${txt}</div>`;
      }).join("");
      return `<div class="scard" onclick="openSite('${s.id}')">
        <div class="scard-head">
          <div style="min-width:0;flex:1">
            <div class="scard-name">${escapeHtml(s.name)}</div>
            ${s.installDate?`<div class="scard-install">Installed ${s.installDate}</div>`:'<div class="scard-install no">No install date</div>'}
          </div>
        </div>
        <div class="scard-prog">
          <div class="bar"><i style="width:${pct}%"></i></div>
          <div class="scard-prog-meta"><span class="d" style="color:#6ee7b7">${p.done} done${p.total?` / ${p.total}`:''}</span>${p.pend>0?`<span class="p" style="color:#fca5a5">${p.pend} overdue</span>`:'<span>tap to manage</span>'}</div>
        </div>
        <div class="insp-grid">${insps}</div>
      </div>`;
    }).join("");
  }
  // stats
  let D=0,P=0;
  sites.forEach(s=>{const p=progressOf(s);D+=p.done;P+=p.pend;});
  document.getElementById("st-sites").textContent=sites.length;
  document.getElementById("st-done").textContent=D;
  document.getElementById("st-pend").textContent=P;
  document.getElementById("count").textContent=`Showing ${list.length} of ${sites.length}`;
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.getElementById("q").addEventListener("input",e=>{query=e.target.value;render();});
document.getElementById("filters").addEventListener("click",e=>{
  const b = e.target.closest("button"); if(!b) return;
  filter = b.dataset.f;
  document.querySelectorAll("#filters .pill").forEach(p=>p.classList.toggle("active",p===b));
  render();
});

function openSite(id){
  openId = id;
  const s = sites.find(x=>x.id===id); if(!s) return;
  document.getElementById("ms-name").textContent = s.name;
  document.getElementById("ms-input-name").value = s.name;
  document.getElementById("ms-install").value = s.installDate||"";
  const rows = document.getElementById("ms-rows");
  rows.innerHTML = LABELS.map((label,i)=>{
    const st = statusFor(s,i);
    const ins = s.inspections[i];
    const due = addMonths(s.installDate, MONTHS[i]);
    const badge = {done:"Done",pend:"Overdue",blank:"Upcoming",na:"N/A"}[st];
    return `<div class="row">
      <div class="num">${i+1}</div>
      <div class="label">${label} month<small>Due: ${due||"set install date"}</small></div>
      <span class="badge ${st}">${badge}</span>
      <input type="date" value="${ins.date||""}" ${ins.noNeed?"disabled":""} onchange="setInsp(${i}, this.value, false)"/>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)"><input type="checkbox" ${ins.noNeed?"checked":""} onchange="setInsp(${i}, null, this.checked)"/>N/A</label>
    </div>`;
  }).join("");
  document.getElementById("m-site").classList.add("open");
}
function closeSite(){document.getElementById("m-site").classList.remove("open");openId=null;render();}
function currentSite(){return sites.find(x=>x.id===openId);}
function setInsp(i,date,noNeed){
  const s = currentSite(); if(!s) return;
  s.inspections[i] = {date: date||null, noNeed: !!noNeed};
  save(); openSite(openId);
}
function updateName(v){const s=currentSite();if(!s)return;s.name=v;document.getElementById("ms-name").textContent=v;save();}
function updateInstall(v){const s=currentSite();if(!s)return;s.installDate=v||null;save();openSite(openId);}
function deleteSite(){
  const s = currentSite(); if(!s) return;
  if(!confirm(`Delete "${s.name}"?`)) return;
  sites = sites.filter(x=>x.id!==s.id); save(); closeSite();
}

function openAdd(){document.getElementById("m-add").classList.add("open");document.getElementById("add-name").value="";document.getElementById("add-date").value="";setTimeout(()=>document.getElementById("add-name").focus(),50);}
function closeAdd(){document.getElementById("m-add").classList.remove("open");}
function doAdd(){
  const name = document.getElementById("add-name").value.trim();
  if(!name) return;
  const install = document.getElementById("add-date").value||null;
  sites.unshift({id:"s"+Date.now(), name, installDate:install, inspections:Array.from({length:9},()=>({date:null,noNeed:false}))});
  save(); closeAdd(); render();
}
